<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thienan Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

.header{
background:white;
padding:15px;
margin:10px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
}

.menu{
width:60px;
height:60px;
background:red;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
}

.banner{
margin:10px;
background:white;
padding:10px;
border-radius:20px;
}

.banner img{
width:100%;
border-radius:15px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:10px;
text-align:center;
}

.price{
color:red;
font-weight:bold;
margin:5px 0;
}

.btn{
display:block;
background:red;
color:white;
padding:10px;
border-radius:10px;
text-decoration:none;
margin-top:10px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,.1);
}

.bottom a{
text-decoration:none;
color:black;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">THIENAN SHOP</div>
<div class="menu">☰</div>
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200">
</div>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1560419015-7c427e8ae5ba?q=80&w=1200">
<div class="card-body">
<h3>Acc Blox Fruit VIP</h3>
<div class="price">50.000đ</div>
<a class="btn" href="#">XEM CHI TIẾT</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1200">
<div class="card-body">
<h3>Acc Blox Fruit Dragon</h3>
<div class="price">100.000đ</div>
<a class="btn" href="#">XEM CHI TIẾT</a>
</div>
</div>

</div>

<div style="height:80px"></div>

<div class="bottom">
<a href="#">🏠 Trang chủ</a>
<a href="#">🛒 Shop</a>
<a href="#">👤 Tài khoản</a>
</div>

</body>
  </html>
